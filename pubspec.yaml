name: EspritSphere
description: "Esprit Sphere - Events, Clubs & Movies."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  url_launcher: ^6.3.1
  flutter_inappwebview: ^6.0.0
  youtube_player_flutter: ^9.1.1
  youtube_player_iframe: ^5.2.1
  dotted_border: ^3.1.0
  carousel_slider: ^5.1.1
  photo_view: ^0.15.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  share_plus: ^11.0.0
  vibration: ^3.1.3
  pointycastle: ^3.7.4
  shared_preferences: ^2.5.3
  provider: ^6.1.5
  crypto: ^3.0.6
  googleapis_auth: ^2.0.0
  qr_flutter: ^4.1.0
  flutter_animate: ^4.5.2
  http: ^1.4.0
  animated_text_kit: ^4.2.3
  flutter_html: ^3.0.0
  google_sign_in: ^7.1.1
  audioplayers: ^6.5.0
  smooth_page_indicator: ^1.2.1
  fl_chart: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/images/movies.jpg
    - assets/images/clubs.jpg
    - assets/images/seats.jpg
    - assets/images/events.jpg
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"